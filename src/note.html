<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickNote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      background: #FFFBEA;
      display: flex;
      flex-direction: column;
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      box-shadow: 3px 3px 12px rgba(0,0,0,0.2);
      overflow: hidden;
      user-select: none;
    }

    /* ── 타이틀바 ── */
    #titlebar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      height: 36px;
      background: #FFF3A3;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      -webkit-app-region: drag;
      z-index: 100;
      clip-path: inset(0 0 0 100%);
      transition: clip-path 0.25s ease;
    }
    #titlebar.visible { clip-path: inset(0 0 0 0%); }

    /* ── 색상 스와치 (사각형) ── */
    #color-swatches {
      display: flex;
      gap: 5px;
      align-items: center;
      -webkit-app-region: no-drag;
    }
    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      border: 1.5px solid rgba(0,0,0,0.15);
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active {
      border-color: rgba(0,0,0,0.55);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
    }

    /* ── 컨트롤 버튼 ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 2px;
      -webkit-app-region: no-drag;
    }
    .ctrl-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 5px;
      background: transparent;
      cursor: pointer;
      color: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
      -webkit-app-region: no-drag;
      padding: 0;
    }
    .ctrl-btn svg {
      display: block;
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }
    .ctrl-btn:hover {
      background: rgba(0,0,0,0.1);
      color: rgba(0,0,0,0.6);
    }
    #btn-pin.active { color: rgba(0,0,0,0.6); }

    /* ── 텍스트에어리어 ── */
    #editor {
      flex: 1;
      width: 100%;
      padding: 14px 16px;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      font-family: inherit;
      font-size: 16px;
      line-height: 1.65;
      color: rgba(0,0,0,0.75);
      caret-color: rgba(0,0,0,0.5);
      user-select: text;
    }
    #editor::placeholder { color: rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div id="titlebar">
    <div id="color-swatches"></div>
    <div class="controls">
      <button class="ctrl-btn" id="btn-new" title="새 메모 (Ctrl+N)">
        <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
          <line x1="6.5" y1="2" x2="6.5" y2="11"/><line x1="2" y1="6.5" x2="11" y2="6.5"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-pin" title="항상 위">
        <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6.5" y1="2" x2="6.5" y2="9"/><line x1="4" y1="9" x2="9" y2="9"/><line x1="6.5" y1="11" x2="6.5" y2="9"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-min" title="최소화">
        <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
          <line x1="2.5" y1="6.5" x2="10.5" y2="6.5"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-close" title="저장 후 닫기">
        <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
          <line x1="2.5" y1="2.5" x2="10.5" y2="10.5"/><line x1="10.5" y1="2.5" x2="2.5" y2="10.5"/>
        </svg>
      </button>
    </div>
  </div>

  <textarea id="editor" placeholder="메모를 입력하세요…"></textarea>

  <script>
    const editor      = document.getElementById('editor');
    const titlebar    = document.getElementById('titlebar');
    const swatchContainer = document.getElementById('color-swatches');
    const btnNew   = document.getElementById('btn-new');
    const btnPin   = document.getElementById('btn-pin');
    const btnMin   = document.getElementById('btn-min');
    const btnClose = document.getElementById('btn-close');

    let isPinned = false;
    let currentColorIndex = parseInt(new URLSearchParams(window.location.search).get('colorIndex') || '0');

    function applyColor(colors, index) {
      const c = colors[index];
      document.body.style.background = c.bg;
      titlebar.style.background = c.bar;
      document.querySelectorAll('.swatch').forEach((s, i) => s.classList.toggle('active', i === index));
    }

    window.api.getColors().then((colors) => {
      colors.forEach((c, i) => {
        const s = document.createElement('div');
        s.className = 'swatch' + (i === currentColorIndex ? ' active' : '');
        s.style.background = c.bar;
        s.title = c.name;
        s.addEventListener('click', () => {
          currentColorIndex = i;
          applyColor(colors, i);
        });
        swatchContainer.appendChild(s);
      });
      applyColor(colors, currentColorIndex);
    });

    // 마우스 Y 좌표로 타이틀바 표시/숨김
    document.addEventListener('mousemove', (e) => {
      titlebar.classList.toggle('visible', e.clientY <= 40);
    });

    async function saveAndClose() {
      const content = editor.value.trim();
      if (content) await window.api.saveNote(content);
      window.api.closeWindow();
    }

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 's') { e.preventDefault(); window.api.saveNote(editor.value.trim()); }
      if (e.ctrlKey && e.key === 'n') { e.preventDefault(); window.api.newNote(); }
    });

    btnNew.addEventListener('click', () => window.api.newNote());
    btnMin.addEventListener('click', () => window.api.minimizeWindow());
    btnClose.addEventListener('click', saveAndClose);
    btnPin.addEventListener('click', async () => {
      isPinned = await window.api.togglePin();
      btnPin.classList.toggle('active', isPinned);
      btnPin.title = isPinned ? '항상 위 해제' : '항상 위';
    });

    editor.focus();
  </script>
</body>
</html>
